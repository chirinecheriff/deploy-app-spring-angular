name: CI/CD - Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build_push_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # construire le JAR avant docker build
      - name: Build backend JAR with Maven
        run: |
          cd springboot/app
          chmod +x mvnw
          ./mvnw -DskipTests package

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest